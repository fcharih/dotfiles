#cloud-config
users:
  - name: fcharih
    groups: [sudo, docker]
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO6aO6QwCAwCgIeQONitgOKWZhpMgVUt2uThK6cYzD7n fcharih@Francoiss-MacBook-Pro.local"

apt:
  sources:
    docker.list:
      source: "deb [arch=amd64 signed-by=$KEY_FILE] https://download.docker.com/linux/ubuntu $RELEASE stable"
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

package_update: true
packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - curl
  - git

runcmd:
  # Docker
  - groupadd -f docker
  - usermod -aG docker fcharih
  - systemctl enable --now docker
  # Nix
  - curl --proto '=https' --tlsv1.2 -fsSL https://install.determinate.systems/nix | sh -s -- install linux --no-confirm --prefer-upstream-nix
  # 1Password CLI via Nix, then chezmoi init (which uses op)
  - >
    su - fcharih -c '
    . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh &&
    nix profile install nixpkgs#_1password-cli &&
    export OP_SERVICE_ACCOUNT_TOKEN=<???> &&
    sh -c "$(curl -fsLS https://get.chezmoi.io/lb)" -- init --apply fcharih
    '
  - nix run home-manager/master -- switch
